# render.yaml
# Render infrastructure-as-code configuration for Konvo backend services
services:
  - type: web
    name: konvo-backend-gateway
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn gateway:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: konvo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: konvo-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: konvo-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: konvo-redis
          property: connectionString
      - key: ADMIN_ROUTE_PATH
        value: admin-portal-secured
      - key: ADMIN_PASSPHRASE
        sync: false # Set securely in Render dashboard
      - key: SECRET_KEY
        sync: false # Set securely in Render dashboard
      - key: RESEND_API_KEY
        sync: false # Set securely in Render dashboard

databases:
  - name: konvo-db
    plan: free

redis:
  - name: konvo-redis
    plan: free
    ipAllowList: [] # default restricted to internal service access
