events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Cache control for Vite hashed assets
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /static/ {
            alias /usr/share/nginx/html/;
        }

        # Expose the admin dashboard at the secure unique route
        location /admin-portal-secured {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # Route all admin endpoints to the user service
        location /api/admin/ {
            proxy_pass http://user-service:8002/api/admin/;
            proxy_set_header Host $host;
        }


        location /api/auth {
            proxy_pass http://auth-service:8001;
            proxy_set_header Host $host;
        }

        location /api/communities {
            proxy_pass http://community-service:8006;
            proxy_set_header Host $host;
        }

        location /api/users {
            proxy_pass http://user-service:8002;
            proxy_set_header Host $host;
        }

        location /api/compatibility {
            proxy_pass http://behavior-engine:8003;
            proxy_set_header Host $host;
        }

        location /api/sentiment {
            proxy_pass http://sentiment-engine:8004;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /api/agents {
            proxy_pass http://ai-agent-service:8005;
            proxy_set_header Host $host;
        }

        location /api/chat {
            proxy_pass http://messaging-service:8009;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /api/graph {
            proxy_pass http://graph-service:8008;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /api/search {
            proxy_pass http://search-service:8010;
            proxy_set_header Host $host;
        }
    }
}
