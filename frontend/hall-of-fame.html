<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hall of Fame | Konvo Security</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme-manager.js"></script>
    <style>
        .hof-container {
            max-width: 800px;
            margin: 8rem auto;
            padding: 2rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: center;
        }
        .hof-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
        .hof-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            line-height: 1.6;
        }
        .hof-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .hof-item {
            padding: 1.25rem;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: var(--font-sans);
            font-size: 1.1rem;
            color: var(--accent-amber);
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hof-date {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .btn-back {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: var(--accent-teal);
            color: white;
            border-radius: 6px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
        }
        .btn-back:hover {
            background-color: var(--accent-cyan);
            transform: translateY(-2px);
        }
    </style>
</head>
<body style="background-color: var(--bg-main); color: var(--text-primary);">
    <div class="hof-container">
        <h1 class="hof-title">Security Acknowledgements</h1>
        <p class="hof-desc">We appreciate the efforts of security researchers in identifying vulnerabilities and helping us maintain a secure platform.</p>
        
        <ul class="hof-list">
            <li class="hof-item">
                <span>Jane Doe</span>
                <span class="hof-date">June 2026</span>
            </li>
            <li class="hof-item">
                <span>John Smith</span>
                <span class="hof-date">May 2026</span>
            </li>
            <li class="hof-item">
                <span>Alex Rivera</span>
                <span class="hof-date">April 2026</span>
            </li>
        </ul>

        <a href="/" class="btn-back">Return to Home Page</a>
    </div>
</body>
</html>
